<html lang="tr">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMMS v15 – Kalıp Bakım Yönetim Sistemi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5}
html,body,#root{width:100%;height:100%}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
table{border-collapse:collapse}
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:225px;background:#0f2044;color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo h1{font-size:15px;font-weight:800}
.sidebar-logo p{font-size:10px;color:#7fa8d4;margin-top:2px}
.sidebar-section{padding:10px 10px 4px;font-size:9px;font-weight:800;color:#4a7aaa;text-transform:uppercase;letter-spacing:.8px}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;background:none;border:none;border-radius:6px;color:#c5d8f0;cursor:pointer;font-size:12px;font-weight:500;text-align:left;transition:all .15s;position:relative}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-btn.active{background:rgba(255,255,255,.15);color:#fff;font-weight:700}
.nav-btn .nbadge{margin-left:auto;background:#e53935;color:#fff;font-size:9px;font-weight:800;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center}
.sidebar-user{padding:12px 14px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #e8edf2;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:15px;font-weight:800;color:#0f2044}
.main{flex:1;overflow-y:auto;padding:20px}
.card{background:#fff;border-radius:12px;border:1px solid #e8edf2;padding:20px;margin-bottom:16px}
.card-sm{background:#fff;border-radius:10px;border:1px solid #e8edf2;padding:14px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:10px;border:1px solid #e8edf2;padding:14px 16px}
.stat-num{font-size:28px;font-weight:800;line-height:1.1}
.stat-lbl{font-size:10px;color:#6b7fa3;margin-top:3px;font-weight:500}
.stat-sub{font-size:10px;margin-top:5px;font-weight:600}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #e8edf2}
table{width:100%;font-size:12px}
thead tr{background:#f5f7fb}
th{padding:10px 12px;text-align:left;font-size:10px;font-weight:800;color:#4a5568;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:2px solid #e8edf2}
td{padding:10px 12px;border-bottom:1px solid #f0f3f7;color:#2d3748;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.tr-link{cursor:pointer}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.tag-red{background:#fff0f0;color:#c62828;border:1px solid #ffcdd2}
.tag-orange{background:#fff8f0;color:#e65100;border:1px solid #ffe0b2}
.tag-blue{background:#f0f4ff;color:#1565c0;border:1px solid #c5cae9}
.tag-green{background:#f0fff4;color:#1a6b3c;border:1px solid #c8e6c9}
.tag-gray{background:#f5f5f5;color:#555;border:1px solid #e0e0e0}
.tag-purple{background:#f5f0ff;color:#7b1fa2;border:1px solid #e1bee7}
.tag-teal{background:#e0f7fa;color:#006064;border:1px solid #b2ebf2}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:#0f2044;color:#fff}
.btn-primary:hover{background:#1a3a6e}
.btn-danger{background:#c62828;color:#fff}
.btn-danger:hover{background:#b71c1c}
.btn-success{background:#1a6b3c;color:#fff}
.btn-success:hover{background:#145530}
.btn-warning{background:#e65100;color:#fff}
.btn-ghost{background:#f0f3f7;color:#2d3748}
.btn-ghost:hover{background:#e2e8f0}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:5px}
.form-label{display:block;font-size:10px;font-weight:800;color:#4a5568;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.form-input{width:100%;padding:9px 11px;border:1.5px solid #dde3ed;border-radius:7px;font-size:12px;background:#fafbff;outline:none;transition:border .15s;color:#1a1a2e}
.form-input:focus{border-color:#1565c0;background:#fff}
.form-group{margin-bottom:13px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-bg{position:fixed;inset:0;background:rgba(15,32,68,.55);backdrop-filter:blur(2px);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;max-height:94vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-head{padding:18px 22px;border-bottom:1px solid #e8edf2;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.modal-head h2{font-size:15px;font-weight:800;color:#0f2044}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid #e8edf2;display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#9aa5b4;line-height:1;padding:2px;flex-shrink:0}
.tabs{display:flex;border-bottom:2px solid #e8edf2;margin-bottom:16px;gap:2px;overflow-x:auto}
.tab{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;font-size:12px;font-weight:600;color:#6b7fa3;white-space:nowrap;transition:all .15s}
.tab.active{color:#0f2044;border-bottom-color:#0f2044;font-weight:800}
.tl{position:relative;padding-left:26px}
.tl::before{content:'';position:absolute;left:9px;top:8px;bottom:8px;width:2px;background:#e8edf2}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-26px;top:2px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;z-index:1;color:#fff;font-weight:800}
.tl-time{font-size:10px;color:#9aa5b4;margin-bottom:1px}
.tl-title{font-size:12px;font-weight:700;color:#0f2044}
.tl-detail{font-size:11px;color:#4a5568;margin-top:2px;line-height:1.5}
.section-title{font-size:12px;font-weight:800;color:#0f2044;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.kk-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f3f7;font-size:12px}
.kk-row:last-child{border:none}
.kk-lbl{color:#6b7fa3;font-size:11px}
.kk-val{font-weight:700;color:#0f2044;text-align:right;max-width:58%}
.progress-bar{height:7px;background:#e8edf2;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}
.alert-box{border-radius:8px;padding:10px 13px;font-size:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:7px;line-height:1.5}
.alert-warning{background:#fff8f0;border:1px solid #ffe0b2;color:#e65100}
.alert-info{background:#f0f4ff;border:1px solid #c5cae9;color:#1565c0}
.alert-success{background:#f0fff4;border:1px solid #c8e6c9;color:#1a6b3c}
.alert-danger{background:#fff0f0;border:1px solid #ffcdd2;color:#c62828}
.ac-box{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #1565c0;border-top:none;border-radius:0 0 8px 8px;z-index:200;box-shadow:0 8px 20px rgba(0,0,0,.12);max-height:200px;overflow-y:auto}
.ac-item{padding:9px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0f3f7}
.ac-item:hover{background:#f0f4ff}
.upload-zone{border:2px dashed #c5cae9;border-radius:10px;padding:28px;text-align:center;cursor:pointer;background:#f8faff}
.upload-zone:hover{background:#e8efff;border-color:#1565c0}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:9px;border-radius:7px;border:1px solid #e8edf2;margin-bottom:6px}
.cl-item.chk{background:#f0fff4;border-color:#c8e6c9}
.cl-cb{width:17px;height:17px;flex-shrink:0;margin-top:1px;cursor:pointer;accent-color:#1a6b3c}
.cl-text{font-size:12px;color:#2d3748;line-height:1.4}
.cl-text.done{text-decoration:line-through;color:#9aa5b4}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.anim{animation:fadeUp .2s ease}
@media(max-width:768px){.sidebar{display:none}.form-grid-2,.form-grid-3{grid-template-columns:1fr}.stat-grid{grid-template-columns:1fr 1fr}}
</style>
